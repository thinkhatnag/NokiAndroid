<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mobile Test Reports</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#f8f9fb;color:#1a202c;padding:40px 20px;min-height:100vh
}
.page{max-width:900px;margin:0 auto}
.hdr{text-align:center;margin-bottom:40px}
.hdr h1{font-size:32px;font-weight:700;font-family:"Courier New",monospace;margin-bottom:10px;color:#1a202c}
.hdr p{font-size:14px;color:#4a5568;font-family:"Courier New",monospace}
.platform{margin-bottom:36px}
.platform-title{font-size:16px;font-weight:700;font-family:"Courier New",monospace;color:#4a5568;margin-bottom:12px}
.reports{display:grid;gap:16px}
.card{
  background:#ffffff;border:1px solid #d4d9e1;border-radius:10px;
  padding:24px 28px;transition:all .2s;cursor:pointer;
  text-decoration:none;display:block
}
.card:hover{
  border-color:#b0b8c8;background:#f4f6f8;
  transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)
}
.card.ios{border-left:4px solid #2563eb}
.card.ios:hover{border-left-color:#1d4ed8}
.card.android{border-left:4px solid #3dba6f}
.card.android:hover{border-left-color:#2ea05a}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:18px;font-weight:600;color:#1a202c;font-family:"Courier New",monospace}
.card-icon{font-size:24px}
.card-meta{font-size:12px;color:#4a5568;font-family:"Courier New",monospace;margin-bottom:14px}
.card-stats{display:flex;gap:14px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:6px;font-size:13px;font-family:"Courier New",monospace}
.stat-dot{width:8px;height:8px;border-radius:50%}
.stat.total .stat-dot{background:#2563eb}
.stat.pass  .stat-dot{background:#16a34a}
.stat.fail  .stat-dot{background:#dc2626}
.stat.skip  .stat-dot{background:#d97706}
.stat-val{font-weight:700}
.stat.total{color:#4a5568}
.stat.pass{color:#16a34a}
.stat.fail{color:#dc2626}
.stat.skip{color:#d97706}
.footer{
  margin-top:60px;text-align:center;
  font-size:12px;color:#a0aec0;font-family:"Courier New",monospace
}
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <h1>&#128202; Test Reports Dashboard</h1>
    <p>Mobile Testing — WebdriverIO + Appium + Allure</p>
  </div>

  <!-- iOS -->
  <section class="platform">
    <h2 class="platform-title">&#127822; iOS Reports</h2>
    <div class="reports">
      <a href="test-report.html" class="card ios">
        <div class="card-top">
          <div class="card-title">iOS Test Run</div>
          <div class="card-icon">&#128241;</div>
        </div>
        <div class="card-meta" id="ios-meta">Loading&hellip;</div>
        <div class="card-stats">
          <div class="stat total"><span class="stat-dot"></span><span class="stat-val" id="ios-total">—</span>&nbsp;total</div>
          <div class="stat pass"> <span class="stat-dot"></span><span class="stat-val" id="ios-pass">—</span>&nbsp;passed</div>
          <div class="stat fail"> <span class="stat-dot"></span><span class="stat-val" id="ios-fail">—</span>&nbsp;failed</div>
          <div class="stat skip"> <span class="stat-dot"></span><span class="stat-val" id="ios-skip">—</span>&nbsp;skipped</div>
        </div>
      </a>
    </div>
  </section>

  <!-- Android -->
  <section class="platform">
    <h2 class="platform-title">&#129302; Android Reports</h2>
    <div class="reports">
      <a href="android-test-report.html" class="card android">
        <div class="card-top">
          <div class="card-title">Android Test Run</div>
          <div class="card-icon">&#129302;</div>
        </div>
        <div class="card-meta" id="and-meta">Loading&hellip;</div>
        <div class="card-stats">
          <div class="stat total"><span class="stat-dot"></span><span class="stat-val" id="and-total">—</span>&nbsp;total</div>
          <div class="stat pass"> <span class="stat-dot"></span><span class="stat-val" id="and-pass">—</span>&nbsp;passed</div>
          <div class="stat fail"> <span class="stat-dot"></span><span class="stat-val" id="and-fail">—</span>&nbsp;failed</div>
          <div class="stat skip"> <span class="stat-dot"></span><span class="stat-val" id="and-skip">—</span>&nbsp;skipped</div>
        </div>
      </a>
    </div>
  </section>

  <div class="footer">Mobile Automation Test Report &bull; WebdriverIO + Appium + Allure</div>

</div>
<script>
// Fetch each report, parse the embedded D={...} data, fill in dashboard stats live
async function loadStats(url, ids) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('missing');
    const text = await res.text();
    // extract var D = { ... }; from the script block
    const m = text.match(/var\s+D\s*=\s*(\{[\s\S]*?\});\s*\n/);
    if (!m) throw new Error('no data');
    const d = JSON.parse(m[1]);
    document.getElementById(ids.meta).textContent  = 'Generated: ' + d.meta.reportDate;
    document.getElementById(ids.total).textContent = d.stats.total;
    document.getElementById(ids.pass).textContent  = d.stats.passed;
    document.getElementById(ids.fail).textContent  = d.stats.failed;
    document.getElementById(ids.skip).textContent  = d.stats.skipped;
  } catch(e) {
    document.getElementById(ids.meta).textContent = 'Report not yet generated — run tests first';
    ['total','pass','fail','skip'].forEach(k => {
      document.getElementById(ids[k]).textContent = '—';
    });
  }
}

loadStats('test-report.html', {
  meta:'ios-meta', total:'ios-total', pass:'ios-pass', fail:'ios-fail', skip:'ios-skip'
});
loadStats('android-test-report.html', {
  meta:'and-meta', total:'and-total', pass:'and-pass', fail:'and-fail', skip:'and-skip'
});
</script>
</body>
</html>
